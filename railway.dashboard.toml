# ══════════════════════════════════════════════════════════════════════════════
# railway.dashboard.toml — Servicio Dashboard (midas-dashboard)
#
# Servicio 2 de 2. Ver railway.toml para la API.
#
# En Railway UI → Service Settings → Source → Config file path:
#   railway.dashboard.toml
#
# Variable de entorno requerida en este servicio:
#   API_URL = https://<dominio-público-del-servicio-api>
# ══════════════════════════════════════════════════════════════════════════════

[build]
builder = "dockerfile"
dockerfilePath = "docker/Dockerfile.dashboard"

[deploy]
startCommand = "streamlit run /app/dashboard/app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true --server.enableCORS false --server.enableXsrfProtection false --server.fileWatcherType none"
healthcheckPath = "/_stcore/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
