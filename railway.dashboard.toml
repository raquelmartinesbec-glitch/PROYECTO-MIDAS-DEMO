[build]
builder = "nixpacks"

[deploy]
restartPolicyType = "always"
restartPolicyMaxRetries = 5
startCommand = "streamlit run dashboard/app.py --server.address 0.0.0.0 --server.port $PORT --server.headless true --server.fileWatcherType none"

[env]
STREAMLIT_SERVER_HEADLESS = "true"
PYTHONUNBUFFERED = "1"