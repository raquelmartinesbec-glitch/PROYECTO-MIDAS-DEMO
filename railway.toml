# ══════════════════════════════════════════════════════════════════════════════
# railway.toml — Servicio API (midas-api)
#
# Servicio 1 de 2. Ver railway.dashboard.toml para el Dashboard.
# Railway usará este archivo por defecto en el servicio API.
# ══════════════════════════════════════════════════════════════════════════════

[build]
builder = "dockerfile"
dockerfilePath = "docker/Dockerfile.api"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3